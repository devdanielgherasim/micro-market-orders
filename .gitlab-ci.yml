# Pipeline for this Quarkus service. Stages, security scanning (SAST +
# Dependency + Secret + HIGH/CRITICAL gate) and the image supply chain (trivy
# scan, syft SBOM, cosign keyless sign + verify) come from the shared template
# in the utilities repo. Only the service-specific `test` and build jobs live
# here; the build job re-homes onto the `build` stage and exports build.env so
# the supply-chain jobs can pick up IMAGE_REF/IMAGE_DIGEST.
include:
  - project: microservices1691715/utilities
    ref: main
    file: ci-templates/java-service.gitlab-ci.yml

stages:
  - test
  - scan
  - build
  - sign
  - promote

cache:
  key:
    files:
      - pom.xml
  paths:
    - .m2/repository/
    - target/
  policy: pull-push

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true"
  CI_TOOLS_IMAGE: "${CONTAINER_REGISTRY_NAME}/java21-docker-azcli:latest"
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "/certs/client"
  CLOUD_PROVIDER: "aws"
  ENVIRONMENT: "dev"
  PROJECT_NAMESPACE: "danielgherasim-microservices"

test:
  stage: test
  image: ${CI_TOOLS_IMAGE}
  services:
    - name: docker:dind
  before_script:
    - chmod +x ./mvnw
  script:
    - ./mvnw ${MAVEN_CLI_OPTS} test
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - pom.xml
  interruptible: true

build-and-push-native:
  stage: build
  image: ${CI_TOOLS_IMAGE}
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  services:
    - name: docker:dind
  before_script:
    - chmod +x ./mvnw ./build.sh
  script:
    - ./build.sh
    # Export IMAGE_REF/IMAGE_DIGEST for the sign/promote stage jobs.
    - !reference [.export-image-ref, script]
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - target/*-runner
    expire_in: 1 week
    reports:
      junit: target/surefire-reports/TEST-*.xml
      dotenv: build.env
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      exists:
        - pom.xml
  resource_group: build
  interruptible: true
