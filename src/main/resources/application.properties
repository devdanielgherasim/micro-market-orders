# Application configuration
quarkus.application.name=orders
quarkus.application.version=1.0.0
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21
# Database configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:oRncHiOovwJAVOXK}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:microservices1691716}
# Hibernate ORM configuration
# Use update for production, validate for strict schema validation
quarkus.hibernate-orm.database.generation=${HIBERNATE_GENERATION:update}
# Disable SQL logging in production
quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}
quarkus.hibernate-orm.sql-load-script=${HIBERNATE_LOAD_SCRIPT:no-file}
# Health check configuration
quarkus.smallrye-health.root-path=/health
quarkus.health.livenessPath=/health/live
quarkus.health.readinessPath=/health/ready
# OpenAPI and Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=Orders API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for orders microservice
# CORS configuration
quarkus.http.cors=true
# Configure specific allowed origins instead of wildcard
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,access-control-allow-headers,access-control-request-method,access-control-request-headers,Origin,Accept
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
# HTTP configuration
quarkus.http.host=0.0.0.0
quarkus.http.port=${HTTP_PORT:8090}
#quarkus.http.ssl-port=${HTTP_SSL_PORT:8083}
# Logging configuration for Loki in Kubernetes
quarkus.log.level=DEBUG
# Remove file handlers as Kubernetes captures stdout/stderr
# quarkus.log.handlers=INFO_FILE,ERR_FILE,EXCEPT_FILE
# Configure console logging for Loki
quarkus.log.console.enable=true
quarkus.log.console.level=DEBUG
# Category-specific logging levels
quarkus.log.category."cloud.microservices.orders.controllers".level=DEBUG
quarkus.log.category."cloud.microservices.orders.services".level=DEBUG
# Set to DEBUG during development for more detailed logs
#quarkus.log.category."cloud.microservices.orders.controllers".level=DEBUG
#quarkus.log.category."cloud.microservices.orders.services".level=DEBUG
# JSON logging format for better integration with Loki
quarkus.log.console.json=true
# Add Kubernetes metadata to logs
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.date-format=yyyy-MM-dd HH:mm:ss.SSS
quarkus.log.console.json.record-delimiter=\n
# Add application name to logs for easier filtering in Loki
quarkus.log.console.json.additional-field.application.value=${quarkus.application.name}
quarkus.log.console.json.additional-field.application.type=string
# Add service version to logs
quarkus.log.console.json.additional-field.version.value=${quarkus.application.version}
quarkus.log.console.json.additional-field.version.type=string
# Keycloak OIDC Configuration
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:https://microservices1691716.westeurope.cloudapp.azure.com/auth/realms/microservices}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:orders-service}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:orders-service-secret}
quarkus.oidc.tls.verification=none
quarkus.keycloak.policy-enforcer.enable=false
# Define security roles
quarkus.security.roles.allowed-for-user=user
quarkus.security.roles.allowed-for-admin=admin
# Configure manual login instead of automatic redirect
quarkus.oidc.authentication.force-redirect-https-scheme=false
quarkus.oidc.authentication.redirect-path=/api/auth/callback
quarkus.oidc.authentication.restore-path-after-redirect=false
# Enable authentication for all endpoints
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
# Audit service client configuration
quarkus.rest-client.audit-service.url=${AUDIT_SERVICE_URL:http://localhost:8089}
quarkus.rest-client.audit-service.scope=jakarta.inject.Singleton
quarkus.rest-client.audit-service.connect-timeout=5000
quarkus.rest-client.audit-service.read-timeout=5000
# Catalog service client configuration
quarkus.rest-client.catalog-service.url=${CATALOG_SERVICE_URL:http://localhost:8088}
quarkus.rest-client.catalog-service.scope=jakarta.inject.Singleton
quarkus.rest-client.catalog-service.connect-timeout=5000
quarkus.rest-client.catalog-service.read-timeout=5000
quarkus.http.auth.permission.health.paths=/health/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.health.methods=GET
